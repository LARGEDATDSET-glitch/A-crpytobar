<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Crypto Earning App - Fake Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background: #222; 
      margin: 0; 
      padding: 0; 
      color: #fff; 
    }
    header { 
      background: #1abc9c;
      padding: 1em; 
      text-align: center;
      font-size: 2em;
      font-weight: bold;
      letter-spacing: 2px;
    }
    .ad-banners-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      padding: 30px;
      justify-content: center;
      background: #171717;
    }
    .ad-banner {
      background: #282c34;
      width: 250px;
      height: 125px;
      border-radius: 12px;
      box-shadow: 0 2px 8px #000a;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      font-size: 1.1em;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
      border: 2px solid #1abc9c;
    }
    .ad-index {
      position: absolute;
      top: 8px;
      right: 12px;
      font-size: 0.9em;
      color: #eee;
      opacity: 0.6;
    }
    .ad-unit-placeholder {
      margin-top: 6px;
      font-size: 0.87em;
      color: #aaa;
      background: #111;
      padding: 3px 8px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <header>Crypto Earning App (Fake Demo)</header>
  <section class="ad-banners-container" id="adBanners"></section>
  <script>
    // Generate 1000 unique ad banner slots, each with one ad unit
    const adBannerContainer = document.getElementById('adBanners');
    for (let i = 1; i <= 1000; i++) {
      const adDiv = document.createElement('div');
      adDiv.className = 'ad-banner';
      adDiv.innerHTML = `
        <span class="ad-index">Ad #${i}</span>
        <div>See and Get <b>Crypto Currency Premium</b></div>
        <div class="ad-unit-placeholder">[Embed ad code here]</div>
      `;
      adBannerContainer.appendChild(adDiv);
    }
  </script>
</body>
</html>
