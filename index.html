<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Crypto Earning App - Fake Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background: #222; 
      margin: 0; 
      padding: 0; 
      color: #fff; 
    }
    header { 
      background: #1abc9c;
      padding: 1em; 
      text-align: center;
      font-size: 2em;
      font-weight: bold;
      letter-spacing: 2px;
    }
    .ad-banners-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      padding: 30px;
      justify-content: center;
      background: #171717;
    }
    .ad-banner {
      background: #282c34;
      width: 250px;
      height: 240px;
      border-radius: 12px;
      box-shadow: 0 2px 8px #000a;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      font-size: 1.1em;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
      border: 2px solid #1abc9c;
    }
    .ad-index {
      position: absolute;
      top: 8px;
      right: 12px;
      font-size: 0.9em;
      color: #eee;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <header>Crypto Earning App (Fake Demo)</header>
  <section class="ad-banners-container" id="adBanners"></section>
  <script>
    const adBannerContainer = document.getElementById('adBanners');
    const adCode = `
      <!-- BEGIN AADS AD UNIT 2429099 -->
      <div id="frame" style="width: 100%;margin: auto;position: relative; z-index: 99998;">
        <iframe data-aa='2429099' src='//acceptable.a-ads.com/2429099/?size=Adaptive'
          style='border:0; padding:0; width:70%; height:auto; overflow:hidden;display: block;margin: auto'></iframe>
        <div style="width: 70%;margin:auto;position: absolute;left: 0;right: 0">
          <a target="_blank" style="display:inline-block;font-size: 13px;color: #263238;padding: 4px 10px;background: #F8F8F9;text-decoration: none; border-radius: 0 0 4px 4px;" id="frame-link" href="https://aads.com/campaigns/new/?source_id=2429099&source_type=ad_unit&partner=2429099">Advertise here</a>
        </div>
      </div>
      <!-- END AADS AD UNIT 2429099 -->
    `;

    for (let i = 1; i <= 1000; i++) {
      const adDiv = document.createElement('div');
      adDiv.className = 'ad-banner';
      adDiv.innerHTML = `
        <span class="ad-index">Ad #${i}</span>
        <div>See and Get <b>Crypto Currency Premium</b></div>
        ${adCode}
      `;
      adBannerContainer.appendChild(adDiv);
    }
  </script>
</body>
</html>
